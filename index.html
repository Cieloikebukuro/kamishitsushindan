<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cielo | 池袋西口</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f4;
  --white: #ffffff;
  --orange: #EB601B;
  --orange-light: #EBA270;
  --orange-pale: #fdf0e8;
  --text: #2c221a;
  --text-muted: #9e8d7e;
  --border: #ede5dc;
  --border-soft: #f0e8e0;
  --cream: #fdf9f5;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.app {
  width: 100%; max-width: 430px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  background: var(--bg);
  position: relative;
}

/* ── brand bar ── */
.brand-bar {
  padding: 20px 22px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; justify-content: space-between;
}
.brand-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 400; letter-spacing: 0.14em;
  color: var(--orange);
}
.brand-loc {
  font-size: 9px; letter-spacing: 0.2em; color: var(--text-muted);
  margin-top: 2px;
}
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--orange); opacity: 0.5;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:0.3; transform:scale(1); }
  50%      { opacity:0.8; transform:scale(1.25); }
}

/* ── hero ── */
.hero {
  padding: 40px 24px 32px;
  text-align: center;
  position: relative; overflow: hidden;
}
.hero-orb {
  position:absolute; border-radius:50%; pointer-events:none;
}
.hero-orb1 {
  width:260px; height:260px; top:-80px; left:-60px;
  background: radial-gradient(circle, rgba(235,96,27,0.07) 0%, transparent 65%);
}
.hero-orb2 {
  width:200px; height:200px; bottom:-60px; right:-40px;
  background: radial-gradient(circle, rgba(235,160,112,0.09) 0%, transparent 65%);
}
.hero-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.26em; color: var(--orange-light);
  margin-bottom: 14px;
  animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}
.hero-title {
  font-size: 28px; font-weight: 400; line-height: 1.5;
  color: var(--text); margin-bottom: 14px;
  animation: fadeUp 0.6s 0.18s cubic-bezier(0.22,1,0.36,1) both;
}
.hero-title em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 34px; color: var(--orange);
  display: block;
}
.hero-desc {
  font-size: 12px; color: var(--text-muted); line-height: 2;
  animation: fadeUp 0.6s 0.26s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── divider ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px 20px;
  animation: fadeUp 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
.divider-line { flex:1; height:1px; background: var(--border); }
.divider-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.2em; color: var(--text-muted);
}

/* ── menu cards ── */
.menu-cards {
  padding: 0 16px;
  display: flex; flex-direction: column; gap: 14px;
}

.menu-card {
  background: var(--white);
  border: 1.5px solid var(--border-soft);
  border-radius: 22px;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  display: block;
  box-shadow: 0 2px 14px rgba(0,0,0,0.04);
  transition: transform 0.24s, box-shadow 0.24s, border-color 0.24s;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.menu-card:nth-child(1) { animation-delay: 0.34s; }
.menu-card:nth-child(2) { animation-delay: 0.42s; }
.menu-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(235,96,27,0.13);
  border-color: var(--orange-light);
}
.menu-card-inner {
  padding: 22px 20px;
  display: flex; align-items: center; gap: 16px;
}
.mc-ico {
  width: 52px; height: 52px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.mc-ico.a { background: linear-gradient(135deg, #fdf0e8, #fde8d8); }
.mc-ico.b { background: linear-gradient(135deg, #f0faf4, #e2f5ea); }
.mc-info { flex: 1; }
.mc-ttl {
  font-size: 15px; font-weight: 500; color: var(--text);
  margin-bottom: 5px; line-height: 1.4;
}
.mc-sub {
  font-size: 12px; color: var(--text-muted); line-height: 1.75;
}
.mc-arrow {
  font-size: 22px; color: var(--orange-light); flex-shrink: 0;
  transition: transform 0.22s;
}
.menu-card:hover .mc-arrow { transform: translateX(3px); }

/* accent stripe at bottom of card */
.menu-card-stripe {
  height: 3px;
}
.menu-card-stripe.orange {
  background: linear-gradient(90deg, var(--orange), var(--orange-light));
}
.menu-card-stripe.green {
  background: linear-gradient(90deg, #06C755, #4dd47d);
}

/* ── line banner ── */
.line-banner {
  margin: 24px 16px 0;
  background: linear-gradient(135deg, #f0faf4 0%, #e8f7f0 100%);
  border: 1.5px solid #c2e8d0;
  border-radius: 18px;
  padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  text-decoration: none;
  transition: all 0.22s;
  animation: fadeUp 0.6s 0.52s cubic-bezier(0.22,1,0.36,1) both;
}
.line-banner:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(6,199,85,0.14); }
.lb-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: #06C755;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.lb-text { flex: 1; }
.lb-title { font-size: 13px; font-weight: 500; color: #1a6637; margin-bottom: 3px; }
.lb-sub { font-size: 11px; color: #5a8a6a; line-height: 1.7; }
.lb-arrow { font-size: 18px; color: #5a8a6a; flex-shrink: 0; }

/* ── footer ── */
.page-footer {
  padding: 28px 24px 48px;
  text-align: center;
  animation: fadeUp 0.6s 0.58s cubic-bezier(0.22,1,0.36,1) both;
}
.footer-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; letter-spacing: 0.2em; color: var(--text-muted);
  margin-bottom: 4px;
}
.footer-sub {
  font-size: 10px; color: var(--text-muted); letter-spacing: 0.14em;
}
</style>
</head>
<body>
<div class="app">

  <!-- brand bar -->
  <div class="brand-bar">
    <div>
      <div class="brand-logo">Cielo</div>
      <div class="brand-loc">IKEBUKURO NISHIGUCHI</div>
    </div>
    <div class="brand-dot"></div>
  </div>

  <!-- hero -->
  <div class="hero">
    <div class="hero-orb hero-orb1"></div>
    <div class="hero-orb hero-orb2"></div>
    <div class="hero-eyebrow">Welcome to Cielo</div>
    <h1 class="hero-title">
      今日の髪を、<br>
      <em>もっと好きになる</em>
    </h1>
    <p class="hero-desc">何からはじめますか？<br>下のメニューからお選びください。</p>
  </div>

  <!-- divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">MENU</div>
    <div class="divider-line"></div>
  </div>

  <!-- menu cards -->
  <div class="menu-cards">

    <a class="menu-card" href="cielo-hair-diagnosis.html">
      <div class="menu-card-inner">
        <div class="mc-ico a">🔬</div>
        <div class="mc-info">
          <div class="mc-ttl">髪質診断</div>
          <div class="mc-sub">今日の髪に合うケアを提案。<br>2〜3分で完了します。</div>
        </div>
        <div class="mc-arrow">›</div>
      </div>
      <div class="menu-card-stripe orange"></div>
    </a>

    <a class="menu-card" href="cielo-coupon.html">
      <div class="menu-card-inner">
        <div class="mc-ico b">🎟️</div>
        <div class="mc-info">
          <div class="mc-ttl">クーポン検索</div>
          <div class="mc-sub">メニューや価格帯で絞り込んで、<br>お得なクーポンを見つけよう。</div>
        </div>
        <div class="mc-arrow">›</div>
      </div>
      <div class="menu-card-stripe green"></div>
    </a>

  </div>

  <!-- footer -->
  <div class="page-footer">
    <div class="footer-logo">Cielo</div>
    <div class="footer-sub">IKEBUKURO NISHIGUCHI</div>
  </div>

</div>
</body>
</html>
