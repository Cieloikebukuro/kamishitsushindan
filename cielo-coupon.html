<html lang="ja">
<head>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f4;
  --white: #ffffff;
  --orange: #EB601B;
  --orange-light: #EBA270;
  --orange-pale: #fdf0e8;
  --orange-glow: rgba(235,96,27,0.10);
  --text: #2c221a;
  --text-muted: #9e8d7e;
  --border: #ede5dc;
  --border-soft: #f0e8e0;
  --cream: #fdf9f5;
  --gold: #c9a84c;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.app {
  width: 100%; max-width: 430px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  background: var(--bg);
  animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1);
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── brand bar ── */
.brand-bar {
  padding: 16px 20px 13px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-soft);
  background: var(--white);
  position: sticky; top: 0; z-index: 10;
}
.brand-left { display:flex; flex-direction:column; }
.brand-logo { display: flex; align-items: center; }
.brand-loc { font-size: 9px; letter-spacing: 0.18em; color: var(--text-muted); margin-top: 1px; }
.brand-tag {
  font-size: 10px; letter-spacing: 0.14em; color: var(--text-muted);
  background: var(--orange-pale); padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── hero ── */
.hero {
  padding: 28px 22px 20px;
  background: var(--white);
  border-bottom: 1px solid var(--border-soft);
  position: relative; overflow: hidden;
}
.hero::after {
  content:'';
  position:absolute; bottom:-40px; right:-40px;
  width:160px; height:160px;
  background: radial-gradient(circle, rgba(235,96,27,0.07) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.22em; color: var(--orange-light);
  margin-bottom: 8px;
}
.hero-title {
  font-size: 22px; font-weight: 400; line-height: 1.5;
  color: var(--text); margin-bottom: 8px;
}
.hero-title em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 26px; color: var(--orange);
}
.hero-desc { font-size: 12px; color: var(--text-muted); line-height: 1.9; }

/* ── filter bar ── */
.filter-section { padding: 16px 16px 0; }
.filter-label { font-size: 10px; letter-spacing: 0.16em; color: var(--text-muted); margin-bottom: 8px; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.chip {
  padding: 7px 14px;
  border: 1.5px solid var(--border);
  border-radius: 50px;
  font-size: 12px; color: var(--text-muted);
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
}
.chip:hover { border-color: var(--orange-light); color: var(--orange); }
.chip.active {
  background: var(--orange); border-color: var(--orange);
  color: white;
  box-shadow: 0 2px 10px rgba(235,96,27,0.22);
}

/* ── results count ── */
.results-meta {
  padding: 10px 18px 6px;
  font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.results-meta span { color: var(--orange); font-weight: 500; }

/* ── coupon list ── */
.coupon-list { padding: 6px 16px 32px; display: flex; flex-direction: column; gap: 14px; }

/* ── coupon card ── */
.coupon-card {
  background: var(--white);
  border: 1px solid var(--border-soft);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  transition: transform 0.22s, box-shadow 0.22s;
  animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
}
.coupon-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
@keyframes cardIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.coupon-card-top {
  padding: 16px 18px 14px;
  border-bottom: 1px dashed var(--border);
  position: relative;
}
.coupon-category { font-size: 10px; letter-spacing: 0.14em; color: var(--orange-light); margin-bottom: 6px; }
.coupon-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
.coupon-desc { font-size: 12px; color: var(--text-muted); line-height: 1.8; }
.coupon-badge {
  position: absolute; top: 14px; right: 16px;
  background: var(--orange-pale);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 10px; color: var(--orange);
  letter-spacing: 0.06em;
}
.coupon-badge.hot { background: var(--orange); color: white; border-color: var(--orange); }

/* ── menu elements ── */
.menu-elements {
  padding: 0 14px 14px;
  border-bottom: 1px dashed var(--border);
}
.menu-elements-toggle {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 0;
  padding: 10px 12px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--orange-pale) 0%, #fdf6f2 100%);
  border: 1.5px solid rgba(235,96,27,0.18);
  border-radius: 12px;
  user-select: none;
  transition: all 0.2s;
}
.menu-elements-toggle:hover { border-color: rgba(235,96,27,0.35); }
.menu-elements-toggle .toggle-label {
  flex: 1;
  font-size: 11.5px; font-weight: 500; color: var(--orange);
  letter-spacing: 0.06em;
}
.menu-elements-toggle .toggle-sub {
  font-size: 10px; color: var(--text-muted);
}
.menu-elements-toggle .toggle-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--orange);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: white;
  transition: transform 0.25s;
  flex-shrink: 0;
}
.menu-elements-toggle.open .toggle-icon { transform: rotate(180deg); }
.menu-elements-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
  opacity: 0;
}
.menu-elements-body.open { max-height: 800px; opacity: 1; }
.menu-element-item {
  margin-top: 8px;
  background: var(--white);
  border-radius: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border-soft);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.menu-element-header { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; flex-wrap: wrap; }
.menu-element-name { font-size: 12.5px; font-weight: 500; color: var(--text); }
.element-badge {
  font-size: 9px; padding: 2px 8px; border-radius: 20px;
  border: 1px solid;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.element-badge.カラー { background: #fff3e0; color: #d4730a; border-color: #f5c791; }
.element-badge.トリートメント { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
.element-badge.パーマ { background: #e8eaf6; color: #3949ab; border-color: #9fa8da; }
.element-badge.縮毛矯正 { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; }
.element-badge.ヘッドスパ { background: #e0f7fa; color: #00838f; border-color: #80deea; }
.element-badge.オプション { background: #fce4ec; color: #c2185b; border-color: #f48fb1; }
.element-badge.髪質改善トリートメント { background: #fff8e1; color: #f57f17; border-color: #ffcc02; }
.menu-element-desc { font-size: 11.5px; color: var(--text-muted); line-height: 1.75; }
/* こちらもおすすめ */
.also-rec {
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid rgba(235,96,27,0.22);
  overflow: hidden;
}
.also-rec-toggle {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 11px;
  background: linear-gradient(135deg, var(--orange-pale) 0%, #fdf6f2 100%);
  cursor: pointer;
  user-select: none;
}
.also-rec-label {
  font-size: 10px; font-weight: 500; color: var(--orange);
  letter-spacing: 0.06em; white-space: nowrap;
}
.also-rec-names {
  font-size: 11px; font-weight: 500; color: var(--orange);
  flex: 1; line-height: 1.5;
}
.also-rec-arrow {
  font-size: 10px; color: var(--orange-light);
  transition: transform 0.25s; flex-shrink: 0;
}
.also-rec-toggle.open .also-rec-arrow { transform: rotate(180deg); }
.also-rec-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.25s;
  opacity: 0;
  background: var(--white);
}
.also-rec-body.open { max-height: 400px; opacity: 1; }
.also-rec-item {
  padding: 10px 12px;
  border-top: 1px solid var(--border-soft);
}
.also-rec-item-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.also-rec-item-name { font-size: 11.5px; font-weight: 500; color: var(--text); }
.also-rec-item-desc { font-size: 11px; color: var(--text-muted); line-height: 1.7; }

/* ── coupon bottom ── */
.coupon-card-bottom {
  padding: 12px 18px;

}
.coupon-price-wrap { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
.coupon-price-original { font-size: 12px; color: var(--text-muted); text-decoration: line-through; }
.coupon-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 400; color: var(--orange);
  letter-spacing: 0.02em;
}
.coupon-price-unit { font-size: 12px; color: var(--text-muted); }
.coupon-conditions { font-size: 10px; color: var(--text-muted); text-align: right; line-height: 1.7; }

/* ── reserve button ── */
.btn-reserve {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--orange);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 12px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.08em;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.22s;
  white-space: nowrap;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(235,96,27,0.28);
}
.btn-reserve:hover {
  background: #d45318;
  transform: translateY(-1px);
  box-shadow: 0 5px 18px rgba(235,96,27,0.38);
}
.btn-reserve svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ── coupon bottom layout ── */
.coupon-card-bottom {
  flex-wrap: wrap;
  gap: 10px;
}
.coupon-bottom-left { display: flex; flex-direction: column; gap: 3px; }

/* ── empty state ── */
.empty-state {
  text-align: center; padding: 48px 24px;
  color: var(--text-muted); font-size: 13px; line-height: 2;
  display: none;
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }

/* ── footer ── */
.page-footer {
  padding: 8px 24px 40px;
  text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em;
}
</style>
</head>

function priceInRange(price, range) {
  if (range === 'all') return true;
  const p = Number(range);
  if (p === 5000)  return price <= 5000;
  if (p === 10000) return price <= 10000;
  if (p === 15000) return price <= 15000;
  if (p === 15001) return price > 15000;
  return true;
}

function buildElementsHTML(elements) {
  if (!elements || elements.length === 0) return '';

  const itemsHTML = elements.map(name => {
    const el = MENU_ELEMENTS[name];
    if (!el) return '';

    const displayName = el.alias ? `${name}（${el.alias}）` : name;
    const desc = el.desc || '';
    const badgeClass = el.category.replace(/\s/g, '');

    // 逆引き：このベースメニューに対して、クーポン未収録の上位互換を表示
    const upgradeCandidates = UPGRADE_MAP[name];
    const filteredUpgrades = upgradeCandidates
      ? upgradeCandidates.filter(u => !elements.includes(u))
      : null;

    let upgradeHTML = '';
    if (filteredUpgrades && filteredUpgrades.length > 0) {
      const upgradeItems = filteredUpgrades.map(uName => {
        const uEl = MENU_ELEMENTS[uName];
        if (!uEl) return '';
        const uBadge = uEl.category.replace(/\s/g, '');
        return `
          <div class="also-rec-item">
            <div class="also-rec-item-header">
              <span class="also-rec-item-name">${uName}</span>
              <span class="element-badge ${uBadge}">${uEl.category}</span>
            </div>
            ${uEl.desc ? `<div class="also-rec-item-desc">${uEl.desc}</div>` : ''}
          </div>`;
      }).join('');

      const uid = `rec-${Math.random().toString(36).slice(2,7)}`;
      upgradeHTML = `
        <div class="also-rec">
          <div class="also-rec-toggle" onclick="toggleAlsoRec(this)">
            <span class="also-rec-label">こちらもおすすめ</span>
            <span class="also-rec-names">${filteredUpgrades.join(' · ')}</span>
            <span class="also-rec-arrow">▾</span>
          </div>
          <div class="also-rec-body">
            ${upgradeItems}
          </div>
        </div>`;
    }

    return `
      <div class="menu-element-item">
        <div class="menu-element-header">
          <span class="menu-element-name">${displayName}</span>
          <span class="element-badge ${badgeClass}">${el.category}</span>
        </div>
        ${desc ? `<div class="menu-element-desc">${desc}</div>` : ''}
        ${upgradeHTML}
      </div>`;
  }).filter(Boolean);

  if (itemsHTML.length === 0) return '';

  return `
    <div class="menu-elements">
      <div class="menu-elements-toggle" onclick="toggleElements(this)">
        <span class="toggle-icon">▾</span>
        <span class="toggle-label">メニューの詳細を見る</span>
        <span class="toggle-sub">${itemsHTML.length}項目</span>
      </div>
      <div class="menu-elements-body">
        ${itemsHTML.join('')}
      </div>
    </div>`;
}

function toggleElements(toggleEl) {
  toggleEl.classList.toggle('open');
  const body = toggleEl.nextElementSibling;
  body.classList.toggle('open');
}

function toggleAlsoRec(toggleEl) {
  toggleEl.classList.toggle('open');
  const body = toggleEl.nextElementSibling;
  body.classList.toggle('open');
}

function renderCoupons() {
  const filtered = COUPONS.filter(c => {
    const catOk = filterCategory === 'all' || c.category === filterCategory;
    const priceOk = priceInRange(c.price, filterPrice);
    return catOk && priceOk;
  });

  const list = document.getElementById('coupon-list');
  const empty = document.getElementById('empty-state');
  document.getElementById('results-count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const badgeClass = (badge) => {
    if (!badge) return '';
    if (badge.includes('人気')) return 'hot';
    return '';
  };

  list.innerHTML = filtered.map((c, i) => `
    <div class="coupon-card" style="animation-delay:${i * 0.05}s">
      <div class="coupon-card-top">
        <div class="coupon-category">${c.category.toUpperCase()} · ${c.category}</div>
        <div class="coupon-name">${c.name}</div>
        <div class="coupon-desc">${c.desc}</div>
        ${c.badge ? `<div class="coupon-badge ${badgeClass(c.badge)}">${c.badge}</div>` : ''}
      </div>
      ${buildElementsHTML(c.elements)}
      <div class="coupon-card-bottom">
        <div class="coupon-bottom-left">
          <div class="coupon-price-wrap">
            <div class="coupon-price">¥${c.price.toLocaleString()}</div>
            <div class="coupon-price-unit">（税込）</div>
          </div>
          <div class="coupon-conditions">${c.conditions.replace(' / ', ' · ')}</div>
        </div>
        ${c.url ? `
        <a class="btn-reserve" href="${c.url}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          予約する
        </a>` : ''}
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const filter = chip.dataset.filter;
    const value = chip.dataset.value;
    document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (filter === 'category') filterCategory = value;
    if (filter === 'price') filterPrice = value;
    renderCoupons();
  });
});

renderCoupons();
</script>
</body>
</html>
