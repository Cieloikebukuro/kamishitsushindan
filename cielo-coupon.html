<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cielo クーポン | 池袋西口</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f4;
  --white: #ffffff;
  --orange: #EB601B;
  --orange-light: #EBA270;
  --orange-pale: #fdf0e8;
  --orange-glow: rgba(235,96,27,0.10);
  --text: #2c221a;
  --text-muted: #9e8d7e;
  --border: #ede5dc;
  --border-soft: #f0e8e0;
  --cream: #fdf9f5;
  --gold: #c9a84c;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.app {
  width: 100%; max-width: 430px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  background: var(--bg);
  animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1);
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── brand bar ── */
.brand-bar {
  padding: 16px 20px 13px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-soft);
  background: var(--white);
  position: sticky; top: 0; z-index: 10;
}
.brand-left { display:flex; flex-direction:column; }
.brand-logo {
  display: flex; align-items: center;
}
.brand-loc {
  font-size: 9px; letter-spacing: 0.18em; color: var(--text-muted);
  margin-top: 1px;
}
.brand-tag {
  font-size: 10px; letter-spacing: 0.14em; color: var(--text-muted);
  background: var(--orange-pale); padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── hero ── */
.hero {
  padding: 28px 22px 20px;
  background: var(--white);
  border-bottom: 1px solid var(--border-soft);
  position: relative; overflow: hidden;
}
.hero::after {
  content:'';
  position:absolute; bottom:-40px; right:-40px;
  width:160px; height:160px;
  background: radial-gradient(circle, rgba(235,96,27,0.07) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.22em; color: var(--orange-light);
  margin-bottom: 8px;
}
.hero-title {
  font-size: 22px; font-weight: 400; line-height: 1.5;
  color: var(--text); margin-bottom: 8px;
}
.hero-title em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 26px; color: var(--orange);
}
.hero-desc {
  font-size: 12px; color: var(--text-muted); line-height: 1.9;
}

/* ── filter bar ── */
.filter-section {
  padding: 16px 16px 0;
}
.filter-label {
  font-size: 10px; letter-spacing: 0.16em; color: var(--text-muted);
  margin-bottom: 8px;
}
.filter-chips {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-bottom: 12px;
}
.chip {
  padding: 7px 14px;
  border: 1.5px solid var(--border);
  border-radius: 50px;
  font-size: 12px; color: var(--text-muted);
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
}
.chip:hover { border-color: var(--orange-light); color: var(--orange); }
.chip.active {
  background: var(--orange); border-color: var(--orange);
  color: white;
  box-shadow: 0 2px 10px rgba(235,96,27,0.22);
}

/* ── results count ── */
.results-meta {
  padding: 10px 18px 6px;
  font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.results-meta span { color: var(--orange); font-weight: 500; }

/* ── coupon list ── */
.coupon-list {
  padding: 6px 16px 32px;
  display: flex; flex-direction: column; gap: 14px;
}

/* ── coupon card ── */
.coupon-card {
  background: var(--white);
  border: 1px solid var(--border-soft);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  transition: transform 0.22s, box-shadow 0.22s;
  animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
}
.coupon-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
@keyframes cardIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.coupon-card-top {
  padding: 16px 18px 14px;
  border-bottom: 1px dashed var(--border);
  position: relative;
}
.coupon-category {
  font-size: 10px; letter-spacing: 0.14em; color: var(--orange-light);
  margin-bottom: 6px;
}
.coupon-name {
  font-size: 15px; font-weight: 500; color: var(--text);
  line-height: 1.5; margin-bottom: 6px;
}
.coupon-desc {
  font-size: 12px; color: var(--text-muted); line-height: 1.8;
}
.coupon-badge {
  position: absolute; top: 14px; right: 16px;
  background: var(--orange-pale);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 10px; color: var(--orange);
  letter-spacing: 0.06em;
}
.coupon-badge.new {
  background: var(--orange); color: white; border-color: var(--orange);
}
.coupon-card-bottom {
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.coupon-price-wrap { display: flex; align-items: baseline; gap: 8px; }
.coupon-price-original {
  font-size: 12px; color: var(--text-muted);
  text-decoration: line-through;
}
.coupon-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 400; color: var(--orange);
  letter-spacing: 0.02em;
}
.coupon-price-unit { font-size: 12px; color: var(--text-muted); }
.coupon-conditions {
  font-size: 10px; color: var(--text-muted); text-align: right;
  line-height: 1.7;
}

/* ── empty state ── */
.empty-state {
  text-align: center; padding: 48px 24px;
  color: var(--text-muted); font-size: 13px; line-height: 2;
  display: none;
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }

/* ── diagnosis link banner ── */
.diagnosis-banner {
  margin: 0 16px 16px;
  background: linear-gradient(135deg, var(--orange-pale) 0%, #fdf6f2 100%);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all 0.22s;
  text-decoration: none;
}
.diagnosis-banner:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(235,96,27,0.12); }
.db-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--orange-pale);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.db-text { flex: 1; }
.db-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.db-sub { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.db-arrow { font-size: 18px; color: var(--orange-light); flex-shrink: 0; }

/* ── footer ── */
.page-footer {
  padding: 8px 24px 40px;
  text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em;
}
.btn-top {
  display:inline-block; font-size:12px; color:var(--text-muted);
  text-decoration:none; padding:6px 12px; transition:color 0.2s;
}
.btn-top:hover { color:var(--orange); }
</style>
</head>

// ══════════════════════════════════════════

let filterCategory = 'all';
let filterPrice = 'all';

function priceInRange(price, range) {
  if (range === 'all') return true;
  const p = Number(range);
  if (p === 5000)  return price <= 5000;
  if (p === 10000) return price <= 10000;
  if (p === 15000) return price <= 15000;
  if (p === 15001) return price > 15000;
  return true;
}

function renderCoupons() {
  const filtered = COUPONS.filter(c => {
    const catOk = filterCategory === 'all' || c.category === filterCategory;
    const priceOk = priceInRange(c.price, filterPrice);
    return catOk && priceOk;
  });

  const list = document.getElementById('coupon-list');
  const empty = document.getElementById('empty-state');
  document.getElementById('results-count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map((c, i) => `
    <div class="coupon-card" style="animation-delay:${i * 0.06}s">
      <div class="coupon-card-top">
        <div class="coupon-category">${c.category.toUpperCase()} · ${c.category}</div>
        <div class="coupon-name">${c.name}</div>
        <div class="coupon-desc">${c.desc}</div>
        ${c.badge ? `<div class="coupon-badge">${c.badge}</div>` : ''}
      </div>
      <div class="coupon-card-bottom">
        <div class="coupon-price-wrap">
          ${c.priceOriginal ? `<div class="coupon-price-original">¥${c.priceOriginal.toLocaleString()}</div>` : ''}
          <div class="coupon-price">¥${c.price.toLocaleString()}</div>
          <div class="coupon-price-unit">（税込）</div>
        </div>
        <div class="coupon-conditions">${c.conditions.replace(' / ', '<br>')}</div>
      </div>
    </div>
  `).join('');
}

// chip click
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const filter = chip.dataset.filter;
    const value = chip.dataset.value;

    // update active state within group
    document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    if (filter === 'category') filterCategory = value;
    if (filter === 'price') filterPrice = value;

    renderCoupons();
  });
});

// init
renderCoupons();
